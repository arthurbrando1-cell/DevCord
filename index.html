<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.cdnfonts.com/css/gg-sans-2');
        body { font-family: 'gg sans', sans-serif; background-color: #1e1f22; color: #dbdee1; }
        .server-scrollbar::-webkit-scrollbar { width: 0px; }
        .custom-scroll::-webkit-scrollbar { width: 8px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 10px; }
        .modal-active { display: flex !important; }
        .channel-active { background: #3f4147; color: white; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <nav class="w-[72px] bg-[#1e1f22] flex flex-col items-center py-3 space-y-2 server-scrollbar overflow-y-auto">
        <div class="w-12 h-12 bg-[#313338] rounded-[24px] hover:rounded-[16px] flex items-center justify-center cursor-pointer transition-all duration-200 group relative" onclick="showSection('home')">
            <i data-lucide="home" class="text-white"></i>
            <div class="absolute left-0 w-1 h-2 bg-white rounded-r-full group-hover:h-5 transition-all"></div>
        </div>
        <div class="w-8 h-[2px] bg-[#35363c] rounded-full"></div>
        <div id="server-list" class="space-y-2">
            </div>
        <button onclick="toggleModal('modal-create-server')" class="w-12 h-12 bg-[#313338] text-[#23a559] rounded-[24px] hover:rounded-[16px] hover:bg-[#23a559] hover:text-white flex items-center justify-center cursor-pointer transition-all duration-200">
            <i data-lucide="plus"></i>
        </button>
    </nav>

    <aside class="w-60 bg-[#2b2d31] flex flex-col">
        <header id="sidebar-header" class="h-12 px-4 flex items-center shadow-sm font-bold text-white border-b border-[#1f2023] cursor-pointer hover:bg-[#35373c]">
            Nexa Pro
            <i data-lucide="chevron-down" class="ml-auto w-4"></i>
        </header>

        <div class="flex-1 overflow-y-auto custom-scroll p-2 space-y-4">
            <div id="home-sidebar-content">
                <button onclick="showSection('friends')" class="w-full flex items-center px-2 py-2 rounded hover:bg-[#35373c] gap-3">
                    <i data-lucide="users" class="w-5"></i> Amigos
                </button>
                <div class="mt-4 text-xs font-bold text-[#949ba4] px-2 flex items-center uppercase">
                    Mensagens Diretas <i data-lucide="plus" class="ml-auto w-3 cursor-pointer"></i>
                </div>
                <div id="dm-list" class="mt-2 space-y-1">
                    </div>
            </div>

            <div id="server-sidebar-content" class="hidden">
                <div class="text-xs font-bold text-[#949ba4] px-2 uppercase">Canais de Texto</div>
                <div id="text-channels" class="mt-2 space-y-1"></div>
                <div class="mt-4 text-xs font-bold text-[#949ba4] px-2 uppercase">Canais de Voz</div>
                <div id="voice-channels" class="mt-2 space-y-1"></div>
            </div>
        </div>

        <div class="h-[52px] bg-[#232428] px-2 flex items-center gap-2">
            <div class="relative cursor-pointer group" onclick="toggleModal('modal-profile')">
                <div id="user-avatar" class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold">U</div>
                <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-[#23a559] border-2 border-[#232428] rounded-full"></div>
                </div>
            <div class="flex-1 leading-tight overflow-hidden">
                <div id="user-display-name" class="text-white text-sm font-bold truncate">Usuário</div>
                <div class="text-[#b5bac1] text-xs">#0001</div>
            </div>
            <div class="flex gap-1 text-[#b5bac1]">
                <i data-lucide="mic" class="w-5 p-1 hover:bg-[#3f4147] rounded cursor-pointer"></i>
                <i data-lucide="headphones" class="w-5 p-1 hover:bg-[#3f4147] rounded cursor-pointer"></i>
                <i data-lucide="settings" onclick="toggleModal('modal-settings')" class="w-5 p-1 hover:bg-[#3f4147] rounded cursor-pointer"></i>
            </div>
        </div>
    </aside>

    <main class="flex-1 bg-[#313338] flex flex-col">
        <header class="h-12 px-4 flex items-center shadow-sm border-b border-[#26272d] gap-2">
            <i data-lucide="hash" id="header-icon" class="text-[#80848e] w-6"></i>
            <span id="active-title" class="text-white font-bold">geral</span>
        </header>

        <div id="main-content-view" class="flex-1 overflow-y-auto custom-scroll p-4 space-y-4">
            </div>

        <div id="chat-input-container" class="px-4 pb-6">
            <form id="chat-form" class="bg-[#383a40] rounded-lg px-4 py-2 flex items-center gap-4">
                <button type="button" class="text-[#b5bac1] hover:text-white"><i data-lucide="plus-circle"></i></button>
                <input type="text" id="message-input" placeholder="Conversar em #geral" class="bg-transparent flex-1 outline-none text-[#dbdee1]">
                <div class="flex gap-3 text-[#b5bac1]">
                    <i data-lucide="gift" class="cursor-pointer hover:text-white"></i>
                    <i data-lucide="sticky-note" class="cursor-pointer hover:text-white"></i>
                    <i data-lucide="smile" class="cursor-pointer hover:text-white"></i>
                </div>
            </form>
        </div>
    </main>

    <div id="modal-profile" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
        <div class="w-[340px] bg-[#111214] rounded-xl overflow-hidden shadow-2xl">
            <div id="profile-banner" class="h-24 bg-indigo-600 relative">
                <div class="absolute -bottom-10 left-4 p-2 bg-[#111214] rounded-full">
                    <div class="w-20 h-20 bg-indigo-500 rounded-full border-[6px] border-[#111214] flex items-center justify-center text-3xl font-bold text-white">U</div>
                </div>
            </div>
            <div class="pt-12 p-4">
                <div class="bg-[#1e1f22] rounded-lg p-4 space-y-3">
                    <h2 class="text-xl font-bold text-white">Usuário <span class="text-[#b5bac1] font-normal">#0001</span></h2>
                    <hr class="border-[#2b2d31]">
                    <div>
                        <div class="text-xs font-bold text-white uppercase mb-1">Sobre mim</div>
                        <p id="profile-bio" class="text-sm">Configurações > Perfil para mudar sua bio!</p>
                    </div>
                </div>
                <button onclick="toggleModal('modal-profile')" class="mt-4 w-full py-2 bg-[#4f545c] text-white rounded font-medium">Fechar</button>
            </div>
        </div>
    </div>

    <div id="modal-create-server" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
        <div class="bg-white w-[440px] rounded-lg p-6 text-center">
            <h2 class="text-2xl font-bold text-black">Crie seu servidor</h2>
            <p class="text-gray-500 mt-2">Dê ao seu novo servidor uma personalidade com um nome.</p>
            <input type="text" id="new-server-name" placeholder="Servidor do Fulano" class="w-full mt-6 p-3 bg-gray-100 rounded border-none outline-none text-black">
            <div class="mt-8 flex justify-between items-center bg-gray-50 -mx-6 -mb-6 p-4">
                <button onclick="toggleModal('modal-create-server')" class="text-sm font-medium text-black">Voltar</button>
                <button onclick="createServer()" class="px-6 py-2 bg-indigo-600 text-white rounded font-medium hover:bg-indigo-700">Criar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // SUA CONFIGURAÇÃO FIREBASE (PODE MANTER)
        const firebaseConfig = {
            apiKey: "AIzaSyD6mo_rK6_4-RtaR8Wzg9UxWy7HaqnKNE8",
            authDomain: "devcord-4dcf6.firebaseapp.com",
            databaseURL: "https://devcord-4dcf6-default-rtdb.firebaseio.com",
            projectId: "devcord-4dcf6",
            storageBucket: "devcord-4dcf6.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let activeServer = 'home';
        let activeChannel = 'geral';

        lucide.createIcons();

        // --- SISTEMA DE NAVEGAÇÃO ---
        window.showSection = (section) => {
            document.getElementById('home-sidebar-content').classList.toggle('hidden', section !== 'home');
            document.getElementById('server-sidebar-content').classList.toggle('hidden', section === 'home');
            
            if(section === 'home') {
                document.getElementById('active-title').innerText = 'Amigos';
                document.getElementById('header-icon').setAttribute('data-lucide', 'users');
                document.getElementById('chat-input-container').classList.add('hidden');
                renderFriendsView();
            } else {
                document.getElementById('chat-input-container').classList.remove('hidden');
            }
            lucide.createIcons();
        }

        // --- CRIAR SERVIDOR (REAL) ---
        window.createServer = () => {
            const name = document.getElementById('new-server-name').value;
            if(!name) return;
            const serverId = "srv_" + Date.now();
            
            set(ref(db, `servers/${serverId}`), {
                name: name,
                owner: auth.currentUser.uid,
                channels: {
                    "geral": { type: "text" },
                    "voz-1": { type: "voice" }
                }
            });

            toggleModal('modal-create-server');
            document.getElementById('new-server-name').value = '';
        }

        // --- CARREGAR SERVIDORES ---
        onValue(ref(db, 'servers'), (snapshot) => {
            const list = document.getElementById('server-list');
            list.innerHTML = '';
            snapshot.forEach((serverSnap) => {
                const s = serverSnap.val();
                const div = document.createElement('div');
                div.className = "w-12 h-12 bg-[#313338] rounded-[24px] hover:rounded-[16px] flex items-center justify-center cursor-pointer transition-all duration-200 group relative";
                div.innerHTML = `<span class="text-white">${s.name[0]}</span>`;
                div.onclick = () => loadServer(serverSnap.key, s);
                list.appendChild(div);
            });
        });

        function loadServer(id, data) {
            activeServer = id;
            showSection('server');
            document.getElementById('sidebar-header').innerText = data.name;
            document.getElementById('active-title').innerText = 'geral';
            
            // Renderiza Canais
            const textChannels = document.getElementById('text-channels');
            textChannels.innerHTML = `
                <div class="flex items-center px-2 py-1 rounded bg-[#3f4147] text-white cursor-pointer gap-2">
                    <i data-lucide="hash" class="w-4"></i> geral
                </div>
            `;
            lucide.createIcons();
            loadMessages(id, 'geral');
        }

        // --- CHAT E MENSAGENS (REAIS) ---
        function loadMessages(serverId, channelId) {
            const mRef = ref(db, `messages/${serverId}/${channelId}`);
            onValue(mRef, (snapshot) => {
                const view = document.getElementById('main-content-view');
                view.innerHTML = '';
                snapshot.forEach(msg => {
                    const d = msg.val();
                    view.innerHTML += `
                        <div class="flex gap-4 group">
                            <div class="w-10 h-10 rounded-full bg-indigo-500 flex-shrink-0 flex items-center justify-center font-bold text-white">${d.user[0]}</div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="text-white font-bold hover:underline cursor-pointer">${d.user}</span>
                                    <span class="text-[#949ba4] text-xs">${new Date(d.time).toLocaleTimeString()}</span>
                                </div>
                                <p class="text-[#dbdee1]">${d.text}</p>
                            </div>
                        </div>
                    `;
                });
                view.scrollTop = view.scrollHeight;
            });
        }

        document.getElementById('chat-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            if(!input.value) return;

            push(ref(db, `messages/${activeServer}/${activeChannel}`), {
                user: auth.currentUser?.displayName || "Usuário",
                text: input.value,
                time: Date.now()
            });
            input.value = '';
        }

        // --- UTILS ---
        window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');
        window.toggleModal('modal-create-server'); // Começar fechado

        function renderFriendsView() {
            document.getElementById('main-content-view').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center">
                    <img src="https://discord.com/assets/a399d161608d27670e37.svg" class="w-80 mb-8">
                    <p class="text-[#949ba4]">Wumpus está esperando amigos. Mas você pode adicionar via Nick#0001!</p>
                    <div class="mt-4 flex gap-2">
                        <input type="text" placeholder="Nick#0000" class="bg-[#1e1f22] p-2 rounded border border-black outline-none">
                        <button class="bg-[#248046] px-4 rounded text-white font-bold">Add Amigo</button>
                    </div>
                </div>
            `;
        }

        onAuthStateChanged(auth, (user) => {
            if(user) {
                document.getElementById('user-display-name').innerText = user.displayName || "Usuário";
                document.getElementById('user-avatar').innerText = (user.displayName || "U")[0];
                showSection('home');
            }
        });

    </script>
</body>
</html>
