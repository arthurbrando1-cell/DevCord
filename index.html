<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexa | Premium Interface</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-deep: #1e1f22;
            --bg-side: #2b2d31;
            --bg-chat: #313338;
            --bg-modifier-hover: rgba(78, 80, 88, 0.3);
            --bg-modifier-selected: rgba(78, 80, 88, 0.6);
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --brand: #5865f2;
            --white: #ffffff;
            --success: #23a559;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background: var(--bg-deep); color: var(--text-normal); height: 100vh; overflow: hidden; display: flex; }

        /* --- NAVIGATION SERVERS --- */
        .server-nav { width: 72px; background: var(--bg-deep); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; z-index: 10; }
        .nav-item { width: 48px; height: 48px; background: var(--bg-chat); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s ease; position: relative; color: var(--success); }
        .nav-item:hover { border-radius: 16px; background: var(--brand); color: white; }
        .nav-item.active { border-radius: 16px; background: var(--brand); color: white; }
        .nav-item.active::before { content: ""; position: absolute; left: -12px; width: 4px; height: 40px; background: white; border-radius: 0 4px 4px 0; }
        .separator { width: 32px; height: 2px; background: var(--bg-side); border-radius: 1px; margin: 4px 0; }

        /* --- SIDEBAR CHANNELS --- */
        .sidebar { width: 240px; background: var(--bg-side); display: flex; flex-direction: column; }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; font-weight: bold; color: white; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: pointer; transition: background 0.2s; }
        .sidebar-header:hover { background: var(--bg-modifier-hover); }
        .channel-list { flex: 1; padding: 12px 8px; overflow-y: auto; }
        .channel-item { padding: 8px; margin-bottom: 2px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text-muted); transition: 0.1s; }
        .channel-item:hover { background: var(--bg-modifier-hover); color: var(--text-normal); }
        .channel-item.active { background: var(--bg-modifier-selected); color: white; }

        /* --- USER PANEL --- */
        .user-panel { height: 52px; background: #232428; display: flex; align-items: center; padding: 0 8px; gap: 8px; }
        .u-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--brand); position: relative; }
        .u-status { width: 12px; height: 12px; background: var(--success); border-radius: 50%; position: absolute; bottom: -2px; right: -2px; border: 2px solid #232428; }
        .u-info { flex: 1; font-size: 13px; line-height: 1.2; }
        .u-name { color: white; font-weight: bold; display: block; }

        /* --- CHAT AREA --- */
        .main-content { flex: 1; display: flex; flex-direction: column; background: var(--bg-chat); }
        .chat-header { height: 48px; padding: 0 16px; display: flex; align-items: center; gap: 8px; font-weight: bold; color: white; border-bottom: 1px solid rgba(0,0,0,0.2); }
        .messages-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg-row { display: flex; gap: 16px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg-content { flex: 1; }
        .msg-meta { display: flex; align-items: baseline; gap: 8px; }
        .author { color: white; font-weight: 500; cursor: pointer; }
        .author:hover { text-decoration: underline; }
        .timestamp { font-size: 11px; color: var(--text-muted); }

        /* --- INPUT --- */
        .input-area { padding: 0 16px 24px; }
        .input-wrapper { background: #383a40; border-radius: 8px; display: flex; align-items: center; padding: 10px 16px; gap: 12px; }
        .chat-input { background: none; border: none; color: var(--text-normal); flex: 1; outline: none; font-size: 15px; }

        /* --- MODAL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 100; transition: 0.3s; }
        .modal-card { background: var(--bg-chat); width: 440px; border-radius: 8px; padding: 24px; text-align: center; }
        .modal-card h2 { color: white; margin-bottom: 8px; }
        .modal-card input { width: 100%; padding: 12px; background: var(--bg-deep); border: none; border-radius: 4px; color: white; margin: 20px 0; outline: none; }
        .btn-primary { background: var(--brand); color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="server-nav">
        <div class="nav-item active" onclick="switchServer('home', this)"><i data-lucide="home"></i></div>
        <div class="separator"></div>
        <div id="custom-servers"></div>
        <div class="nav-item" onclick="openModal()"><i data-lucide="plus"></i></div>
    </nav>

    <aside class="sidebar">
        <header class="sidebar-header" id="server-title">Nexa Central <i data-lucide="chevron-down" style="margin-left: auto; width: 16px;"></i></header>
        <div class="channel-list" id="channel-container">
            </div>
        <div class="user-panel">
            <div class="u-avatar"><div class="u-status"></div></div>
            <div class="u-info">
                <span class="u-name" id="display-name">Carregando...</span>
                <span style="color: var(--text-muted); font-size: 11px;">Online</span>
            </div>
            <div style="display: flex; gap: 4px;">
                <i data-lucide="mic" style="width: 18px; cursor: pointer;"></i>
                <i data-lucide="settings" style="width: 18px; cursor: pointer;"></i>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="chat-header">
            <i data-lucide="hash" style="width: 20px; color: var(--text-muted);"></i>
            <span id="current-channel-title">geral</span>
        </header>
        
        <div class="messages-box" id="chat-messages">
            </div>

        <div class="input-area">
            <form class="input-wrapper" id="message-form">
                <i data-lucide="plus-circle" style="cursor: pointer; color: var(--text-muted);"></i>
                <input type="text" class="chat-input" id="msg-input" placeholder="Conversar em #geral">
            </form>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-card">
            <h2>Personalize seu servidor</h2>
            <p style="color: var(--text-muted);">Dê um nome ao seu novo servidor. Você sempre pode mudá-lo depois.</p>
            <input type="text" id="server-name-input" placeholder="Nome do servidor">
            <button class="btn-primary" onclick="createNewServer()">Criar Servidor</button>
            <p style="margin-top: 12px; cursor: pointer; font-size: 13px;" onclick="closeModal()">Voltar</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // CONFIGURAÇÃO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyD6mo_rK6_4-RtaR8Wzg9UxWy7HaqnKNE8",
            authDomain: "devcord-4dcf6.firebaseapp.com",
            databaseURL: "https://devcord-4dcf6-default-rtdb.firebaseio.com",
            projectId: "devcord-4dcf6",
            storageBucket: "devcord-4dcf6.firebasestorage.app",
            messagingSenderId: "168388878048",
            appId: "1:168388878048:web:c4b9628253e4b46c077a85"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentChannel = 'geral';
        let currentServerId = 'home';

        // INICIALIZAR ÍCONES
        lucide.createIcons();

        // NAVEGAÇÃO ENTRE CANAIS
        const channels = ['geral', 'avisos', 'ajuda', 'bate-papo'];
        function renderChannels() {
            const container = document.getElementById('channel-container');
            container.innerHTML = channels.map(c => `
                <div class="channel-item ${c === currentChannel ? 'active' : ''}" onclick="switchChannel('${c}')">
                    <i data-lucide="hash" style="width: 18px;"></i> ${c}
                </div>
            `).join('');
            lucide.createIcons();
        }

        window.switchChannel = (name) => {
            currentChannel = name;
            document.getElementById('current-channel-title').innerText = name;
            document.getElementById('msg-input').placeholder = `Conversar em #${name}`;
            renderChannels();
            loadMessages();
        };

        // CRIAR SERVIDOR (UI)
        window.createNewServer = () => {
            const name = document.getElementById('server-name-input').value;
            if(!name) return;
            
            const id = Date.now();
            const serverBtn = document.createElement('div');
            serverBtn.className = 'nav-item';
            serverBtn.innerHTML = name[0].toUpperCase();
            serverBtn.onclick = () => switchServer(id, serverBtn, name);
            
            document.getElementById('custom-servers').appendChild(serverBtn);
            closeModal();
            document.getElementById('server-name-input').value = '';
        };

        window.switchServer = (id, el, name = "Nexa Central") => {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('server-title').innerText = name;
            currentServerId = id;
            // Aqui você poderia carregar canais específicos do servidor do Firebase
        };

        // CHAT REAL-TIME
        function loadMessages() {
            const msgRef = ref(db, `messages/${currentChannel}`);
            onValue(msgRef, (snapshot) => {
                const box = document.getElementById('chat-messages');
                box.innerHTML = '';
                snapshot.forEach(snap => {
                    const m = snap.val();
                    const div = document.createElement('div');
                    div.className = 'msg-row';
                    div.innerHTML = `
                        <div class="msg-avatar" style="width:40px; height:40px; background:#5865f2; border-radius:50%; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">${m.user[0]}</div>
                        <div class="msg-content">
                            <div class="msg-meta">
                                <span class="author">${m.user}</span>
                                <span class="timestamp">${new Date(m.time).toLocaleTimeString()}</span>
                            </div>
                            <div class="msg-text">${m.text}</div>
                        </div>
                    `;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('message-form').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            if(!input.value.trim()) return;

            push(ref(db, `messages/${currentChannel}`), {
                user: auth.currentUser.displayName || "Membro",
                text: input.value,
                time: Date.now()
            });
            input.value = '';
        };

        // MODAL CONTROLS
        window.openModal = () => document.getElementById('modal').style.display = 'flex';
        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        // AUTH STATE
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('display-name').innerText = user.displayName || "Usuário";
                renderChannels();
                loadMessages();
            } else {
                // Se não estiver logado, você pode redirecionar ou mostrar o modal de login
                console.log("Aguardando login...");
            }
        });
    </script>
</body>
</html>
