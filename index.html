<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa | Comunicação Estilo Discord</title>
<style>
  :root {
    --bg-tertiary: #1e1f22;
    --bg-secondary: #2b2d31;
    --bg-primary: #313338;
    --text-normal: #dbdee1;
    --text-muted: #949ba4;
    --brand: #5865f2;
    --brand-hover: #4752c4;
    --danger: #ed4245;
    --success: #23a559;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'gg sans', 'Segoe UI', Tahoma, sans-serif; }
  
  body { background: var(--bg-tertiary); color: var(--text-normal); height: 100vh; overflow: hidden; display: flex; }

  /* Auth Screen Customization */
  #auth-screen { position: fixed; inset: 0; background: var(--bg-primary); display: flex; justify-content: center; align-items: center; z-index: 9999; }
  .auth-box { background: var(--bg-secondary); padding: 32px; border-radius: 8px; width: 400px; box-shadow: 0 8px 16px rgba(0,0,0,0.2); text-align: center; }
  .auth-box h2 { margin-bottom: 8px; color: #fff; }
  .auth-box p { color: var(--text-muted); margin-bottom: 20px; }
  .auth-box input { width: 100%; padding: 12px; margin-bottom: 15px; background: var(--bg-tertiary); border: none; color: #fff; border-radius: 4px; outline: none; }
  .auth-box button { width: 100%; padding: 12px; background: var(--brand); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
  .auth-box button:hover { background: var(--brand-hover); }
  .auth-toggle { margin-top: 15px; color: #00a8fc; cursor: pointer; font-size: 14px; }

  /* Main Layout */
  #app { display: none; width: 100%; height: 100%; }

  /* Servers Bar */
  .servers { width: 72px; background: var(--bg-tertiary); display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; }
  .server-icon { width: 48px; height: 48px; background: var(--bg-primary); border-radius: 50%; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s; color: var(--success); font-size: 20px; }
  .server-icon:hover, .server-icon.active { border-radius: 16px; background: var(--brand); color: #fff; }
  
  /* Sidebar */
  .sidebar { width: 240px; background: var(--bg-secondary); display: flex; flex-direction: column; }
  .sidebar-header { height: 48px; border-bottom: 1px solid rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 16px; font-weight: bold; color: #fff; justify-content: space-between; }
  .channels { flex: 1; padding: 16px 8px; overflow-y: auto; }
  .channel { padding: 8px; margin-bottom: 2px; border-radius: 4px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; gap: 8px; transition: 0.1s; }
  .channel:hover { background: rgba(79,84,92,0.16); color: var(--text-normal); }
  .channel.active { background: rgba(79,84,92,0.24); color: #fff; }

  /* User Panel */
  .user-panel { height: 52px; background: #232428; display: flex; align-items: center; padding: 0 8px; gap: 8px; }
  .avatar-container { position: relative; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--brand); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; }
  .status-dot { width: 12px; height: 12px; background: var(--success); border-radius: 50%; position: absolute; bottom: -2px; right: -2px; border: 2px solid #232428; }

  /* Chat Area */
  .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
  .chat-header { height: 48px; border-bottom: 1px solid rgba(0,0,0,0.2); display: flex; align-items: center; padding: 0 16px; font-weight: bold; color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  .messages { flex: 1; overflow-y: auto; padding: 16px; }
  .message { display: flex; gap: 16px; margin-bottom: 16px; }
  .msg-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--brand); flex-shrink: 0; }
  .msg-content { display: flex; flex-direction: column; }
  .msg-author { color: #fff; font-weight: 500; font-size: 1rem; }
  .msg-time { font-size: 0.75rem; color: var(--text-muted); margin-left: 8px; }
  .msg-text { color: var(--text-normal); margin-top: 4px; line-height: 1.4; }

  /* Input */
  .chat-input-wrapper { padding: 0 16px 24px; }
  .chat-input-container { background: #383a40; border-radius: 8px; padding: 10px 16px; display: flex; align-items: center; }
  .chat-input { background: none; border: none; color: var(--text-normal); flex: 1; outline: none; font-size: 1rem; }

  /* Members List */
  .members-sidebar { width: 240px; background: var(--bg-secondary); padding: 16px 8px; }
  .members-header { font-size: 12px; font-weight: bold; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; padding-left: 8px; }

  /* Utility */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-box">
    <h2 id="auth-title">Boas-vindas de volta!</h2>
    <p>Estamos muito animados em te ver novamente!</p>
    <form id="auth-form">
      <input type="text" id="auth-name" placeholder="Como quer ser chamado?" class="hidden">
      <input type="email" id="auth-email" placeholder="E-mail" required>
      <input type="password" id="auth-password" placeholder="Senha" required>
      <button type="submit" id="auth-btn">Entrar</button>
    </form>
    <div class="auth-toggle" id="auth-toggle">Precisa de uma conta? Registre-se</div>
  </div>
</div>

<div id="app">
  <div class="servers">
    <div class="server-icon active" title="Início">🏠</div>
    <div style="width: 32px; height: 2px; background: var(--bg-secondary); margin: 4px 0;"></div>
    <div class="server-icon" title="Adicionar Servidor">+</div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span>Nexa Community</span>
    </div>
    <div class="channels">
      <div class="channel active"># geral</div>
      <div class="channel"># ajuda</div>
      <div class="channel"># off-topic</div>
    </div>
    
    <div class="user-panel">
      <div class="avatar-container">
        <div class="avatar" id="my-avatar">U</div>
        <div class="status-dot"></div>
      </div>
      <div style="flex:1">
        <div id="my-name" style="font-weight:bold; font-size:14px; color:#fff;">Usuário</div>
        <div style="font-size:12px; color:var(--text-muted);">#0001</div>
      </div>
      <button style="background:none; border:none; cursor:pointer; filter: grayscale(1);">⚙️</button>
    </div>
  </div>

  <div class="chat-area">
    <div class="chat-header"># geral</div>
    <div class="messages" id="messages-container">
        </div>
    <div class="chat-input-wrapper">
      <form id="chat-form" class="chat-input-container">
        <input type="text" id="chat-input" class="chat-input" placeholder="Conversar em #geral" autocomplete="off">
      </form>
    </div>
  </div>

  <div class="members-sidebar">
    <div class="members-header">Disponível — 1</div>
    <div id="members-list">
        <div class="channel" style="cursor:default;">
            <div class="avatar" style="width:32px; height:32px; font-size:12px;">AI</div>
            <span>Gemini Bot</span>
        </div>
    </div>
  </div>
</div>

<script type="module">
  // Firebase SDKs
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  // Configuração (Usando a sua fornecida)
  const firebaseConfig = {
    apiKey: "AIzaSyD6mo_rK6_4-RtaR8Wzg9UxWy7HaqnKNE8",
    authDomain: "devcord-4dcf6.firebaseapp.com",
    databaseURL: "https://devcord-4dcf6-default-rtdb.firebaseio.com",
    projectId: "devcord-4dcf6",
    storageBucket: "devcord-4dcf6.firebasestorage.app",
    messagingSenderId: "168388878048",
    appId: "1:168388878048:web:c4b9628253e4b46c077a85"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let isLoginMode = true;

  // Alternar Login/Registro
  document.getElementById('auth-toggle').onclick = () => {
    isLoginMode = !isLoginMode;
    document.getElementById('auth-title').innerText = isLoginMode ? 'Boas-vindas de volta!' : 'Criar uma conta';
    document.getElementById('auth-name').classList.toggle('hidden', isLoginMode);
    document.getElementById('auth-btn').innerText = isLoginMode ? 'Entrar' : 'Continuar';
    document.getElementById('auth-toggle').innerText = isLoginMode ? 'Precisa de uma conta? Registre-se' : 'Já tem uma conta? Entre';
  };

  // Lógica de Auth
  document.getElementById('auth-form').onsubmit = async (e) => {
    e.preventDefault();
    const email = document.getElementById('auth-email').value;
    const password = document.getElementById('auth-password').value;
    const name = document.getElementById('auth-name').value;

    try {
      if (isLoginMode) {
        await signInWithEmailAndPassword(auth, email, password);
      } else {
        const res = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(res.user, { displayName: name });
      }
    } catch (err) { alert("Erro: " + err.message); }
  };

  // Monitorar Usuário
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      document.getElementById('my-name').innerText = user.displayName || user.email.split('@')[0];
      document.getElementById('my-avatar').innerText = (user.displayName || 'U')[0].toUpperCase();
      loadMessages();
    } else {
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });

  // Carregar Mensagens
  function loadMessages() {
    const msgRef = query(ref(db, 'messages/geral'), limitToLast(50));
    onValue(msgRef, (snapshot) => {
      const container = document.getElementById('messages-container');
      container.innerHTML = '';
      snapshot.forEach((child) => {
        const data = child.val();
        const div = document.createElement('div');
        div.className = 'message';
        div.innerHTML = `
          <div class="msg-avatar" style="display:flex; align-items:center; justify-content:center; color:#fff; font-weight:bold;">
            ${(data.authorName || 'U')[0].toUpperCase()}
          </div>
          <div class="msg-content">
            <div><span class="msg-author">${data.authorName}</span><span class="msg-time">${new Date(data.timestamp).toLocaleTimeString()}</span></div>
            <div class="msg-text">${data.text}</div>
          </div>
        `;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
    });
  }

  // Enviar Mensagem
  document.getElementById('chat-form').onsubmit = (e) => {
    e.preventDefault();
    const input = document.getElementById('chat-input');
    if (!input.value.trim()) return;

    push(ref(db, 'messages/geral'), {
      authorName: auth.currentUser.displayName || auth.currentUser.email.split('@')[0],
      text: input.value,
      timestamp: Date.now()
    });
    input.value = '';
  };
</script>
</body>
</html>
