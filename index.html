<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Modelos 3D com IA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #1a1d24;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #2dd4bf33;
            --accent: #2dd4bf;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background-color: var(--bg-panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .header { padding: 20px; border-bottom: 1px solid var(--border); }
        .header h1 { font-size: 1.2rem; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .header h1::before { content: ''; display: block; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        
        /* Tabs */
        .tabs { display: flex; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; padding: 12px 0; text-align: center; cursor: pointer; color: var(--text-muted); font-size: 0.9rem; font-weight: 500; transition: all 0.3s; border-bottom: 2px solid transparent; }
        .tab:hover { color: var(--text-main); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        
        /* Panels */
        .panel-container { flex: 1; overflow-y: auto; padding: 20px; }
        .panel { display: none; animation: fadeIn 0.3s ease; }
        .panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Forms & Inputs */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-muted); }
        input[type="text"], input[type="number"], select { width: 100%; padding: 10px; background: var(--bg-dark); border: 1px solid var(--border); border-radius: 6px; color: white; outline: none; transition: border 0.3s; }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--primary); }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        
        /* Buttons */
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 500; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn:hover { background: var(--primary-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-outline:hover { background: rgba(99, 102, 241, 0.1); }
        
        /* Upload Area */
        .upload-area { border: 2px dashed var(--border); border-radius: 8px; padding: 30px 20px; text-align: center; cursor: pointer; transition: all 0.3s; margin-bottom: 15px; }
        .upload-area:hover, .upload-area.dragover { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .upload-icon { font-size: 2rem; color: var(--primary); margin-bottom: 10px; }
        .preview-container { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
        .preview-img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
        
        /* Main Area */
        .main-area { flex: 1; position: relative; background: radial-gradient(circle at center, #1a1d24 0%, #0f1115 100%); }
        #canvas-container { width: 100%; height: 100%; }
        
        /* Overlay / Loading */
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 17, 21, 0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 20; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.active { opacity: 1; pointer-events: all; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(45, 212, 191, 0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Toolbar */
        .toolbar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg-panel); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--border); display: flex; gap: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .tool-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; transition: color 0.3s; }
        .tool-btn:hover, .tool-btn.active { color: var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <h1>Nexus3D Gen</h1>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-target="upload">Upload</div>
            <div class="tab" data-target="editor">Editor</div>
            <div class="tab" data-target="settings">Config</div>
            <div class="tab" data-target="export">Exportar</div>
        </div>
        
        <div class="panel-container">
            <!-- Upload Panel -->
            <div class="panel active" id="upload">
                <div class="form-group">
                    <label>Upload de Imagem (Frente/Referência)</label>
                    <div class="upload-area" id="drop-zone">
                        <div class="upload-icon">📁</div>
                        <p>Arraste uma imagem ou clique para selecionar</p>
                        <input type="file" id="file-input" accept="image/*" style="display: none;">
                    </div>
                    <div class="preview-container" id="preview-container"></div>
                </div>
                
                <div class="form-group">
                    <label>Ou cole a URL da imagem</label>
                    <input type="text" id="image-url" placeholder="https://exemplo.com/imagem.jpg">
                </div>
                
                <button class="btn" id="btn-generate">
                    <span>✨</span> Gerar Modelo 3D
                </button>
            </div>
            
            <!-- Editor Panel -->
            <div class="panel" id="editor">
                <div class="form-group">
                    <label>Resolução da Malha</label>
                    <input type="range" id="mesh-resolution" min="32" max="256" value="128" step="32">
                    <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-muted); margin-top: 5px;">
                        <span>Baixa</span><span>Alta</span>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Profundidade (Extrusão)</label>
                    <input type="range" id="mesh-depth" min="1" max="50" value="15">
                </div>
                
                <div class="form-group">
                    <label>Suavização (Smoothing)</label>
                    <input type="range" id="mesh-smooth" min="0" max="10" value="3">
                </div>
                
                <button class="btn btn-outline" id="btn-update-mesh" style="margin-top: 10px;">
                    Atualizar Malha
                </button>
            </div>
            
            <!-- Settings Panel -->
            <div class="panel" id="settings">
                <div class="form-group">
                    <label>Modo de Visualização</label>
                    <select id="view-mode">
                        <option value="solid">Sólido</option>
                        <option value="wireframe">Wireframe</option>
                        <option value="textured" selected>Texturizado (Original)</option>
                        <option value="normals">Normais</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Cor do Material (Modo Sólido)</label>
                    <input type="color" id="material-color" value="#cccccc" style="width: 100%; height: 40px; padding: 0; cursor: pointer;">
                </div>
                
                <div class="form-group">
                    <label>Intensidade da Luz</label>
                    <input type="range" id="light-intensity" min="0" max="2" step="0.1" value="1">
                </div>
                
                <div class="form-group" style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="auto-rotate" checked>
                    <label style="margin: 0;">Rotação Automática</label>
                </div>
            </div>
            
            <!-- Export Panel -->
            <div class="panel" id="export">
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 20px;">
                    Exporte seu modelo gerado para uso em outras aplicações 3D, jogos ou impressão 3D.
                </p>
                
                <div class="form-group">
                    <button class="btn" id="btn-export-glb" style="margin-bottom: 10px;">
                        Exportar .GLB (Recomendado)
                    </button>
                    <button class="btn btn-outline" id="btn-export-obj" style="margin-bottom: 10px;">
                        Exportar .OBJ
                    </button>
                    <button class="btn btn-outline" id="btn-export-stl">
                        Exportar .STL (Impressão 3D)
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="main-area">
        <div id="canvas-container"></div>
        
        <div class="overlay" id="loading-overlay">
            <div class="spinner"></div>
            <h3 id="loading-text">Processando imagem com IA...</h3>
            <p style="color: var(--text-muted); font-size: 0.85rem; margin-top: 10px;">Isso pode levar alguns segundos</p>
        </div>
        
        <div class="toolbar">
            <button class="tool-btn" id="tool-reset" title="Resetar Câmera">🏠</button>
            <button class="tool-btn active" id="tool-grid" title="Alternar Grade">▦</button>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';
        import { GLTFExporter } from 'three/examples/jsm/exporters/GLTFExporter.js';
        import { OBJExporter } from 'three/examples/jsm/exporters/OBJExporter.js';
        import { STLExporter } from 'three/examples/jsm/exporters/STLExporter.js';

        // --- App State ---
        const state = {
            imageSrc: null,
            mesh: null,
            texture: null,
            isGenerating: false,
            settings: {
                resolution: 128,
                depth: 15,
                smooth: 3,
                viewMode: 'textured',
                color: '#cccccc',
                autoRotate: true,
                showGrid: true
            }
        };

        // --- UI Elements ---
        const tabs = document.querySelectorAll('.tab');
        const panels = document.querySelectorAll('.panel');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const urlInput = document.getElementById('image-url');
        const btnGenerate = document.getElementById('btn-generate');
        const loadingOverlay = document.getElementById('loading-overlay');
        
        // --- Three.js Setup ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(0, 0, 100);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        
        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 50, 50);
        scene.add(dirLight);
        
        const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
        backLight.position.set(-50, -50, -50);
        scene.add(backLight);
        
        // Helpers
        const gridHelper = new THREE.GridHelper(100, 20, 0x2dd4bf, 0x444444);
        gridHelper.position.y = -20;
        gridHelper.material.opacity = 0.2;
        gridHelper.material.transparent = true;
        scene.add(gridHelper);
        
        // Default Object (Placeholder)
        const geometry = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x2dd4bf, 
            wireframe: true,
            transparent: true,
            opacity: 0.3
        });
        let currentMesh = new THREE.Mesh(geometry, material);
        scene.add(currentMesh);

        // --- Animation Loop ---
        function animate() {
            requestAnimationFrame(animate);
            if (state.settings.autoRotate && currentMesh) {
                currentMesh.rotation.y += 0.005;
            }
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- Resize Handler ---
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // --- UI Interactions ---
        
        // Tabs
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                panels.forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.add('active');
            });
        });

        // File Upload
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) {
                handleFile(e.target.files[0]);
            }
        });
        
        urlInput.addEventListener('change', (e) => {
            if (e.target.value) {
                state.imageSrc = e.target.value;
                updatePreview(state.imageSrc);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                state.imageSrc = e.target.result;
                updatePreview(state.imageSrc);
                urlInput.value = '';
            };
            reader.readAsDataURL(file);
        }

        function updatePreview(src) {
            previewContainer.innerHTML = `<img src="${src}" class="preview-img" alt="Preview">`;
        }

        // --- 3D Generation Logic (Heightmap Simulation) ---
        
        btnGenerate.addEventListener('click', () => {
            if (!state.imageSrc) {
                alert('Por favor, faça upload de uma imagem primeiro.');
                return;
            }
            generateModel();
        });

        document.getElementById('btn-update-mesh').addEventListener('click', () => {
            if (state.imageSrc) generateModel();
        });

        function generateModel() {
            loadingOverlay.classList.add('active');
            
            // Update settings from UI
            state.settings.resolution = parseInt(document.getElementById('mesh-resolution').value);
            state.settings.depth = parseInt(document.getElementById('mesh-depth').value);
            state.settings.smooth = parseInt(document.getElementById('mesh-smooth').value);
            
            // Simulate AI processing time
            setTimeout(() => {
                processImageToMesh(state.imageSrc);
            }, 500);
        }

        function processImageToMesh(imgSrc) {
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                // Create canvas to read pixel data
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                
                // Use resolution setting
                const res = state.settings.resolution;
                canvas.width = res;
                canvas.height = res;
                
                // Draw image to canvas
                ctx.drawImage(img, 0, 0, res, res);
                const imgData = ctx.getImageData(0, 0, res, res).data;
                
                // Create Box Geometry for thickness
                const depthMultiplier = state.settings.depth;
                const geometry = new THREE.BoxGeometry(40, 40, depthMultiplier, res - 1, res - 1, 1);
                const vertices = geometry.attributes.position.array;
                const uvs = geometry.attributes.uv.array;
                
                // Apply heightmap based on brightness
                const heights = new Float32Array(res * res);
                
                // Process image data to extract heights and optionally remove black background
                const processedCanvas = document.createElement('canvas');
                processedCanvas.width = res;
                processedCanvas.height = res;
                const pCtx = processedCanvas.getContext('2d');
                const pImgData = pCtx.createImageData(res, res);
                
                for (let i = 0, j = 0; i < imgData.length; i += 4, j++) {
                    const r = imgData[i];
                    const g = imgData[i+1];
                    const b = imgData[i+2];
                    let a = imgData[i+3];
                    
                    // Simple black background removal if no alpha channel is present
                    if (a === 255 && r < 15 && g < 15 && b < 15) {
                        a = 0;
                    }
                    
                    pImgData.data[i] = r;
                    pImgData.data[i+1] = g;
                    pImgData.data[i+2] = b;
                    pImgData.data[i+3] = a;
                    
                    if (a < 10) {
                        heights[j] = 0;
                    } else {
                        const brightness = (r + g + b) / (3 * 255);
                        heights[j] = brightness * depthMultiplier;
                    }
                }
                
                pCtx.putImageData(pImgData, 0, 0);
                const processedImgSrc = processedCanvas.toDataURL();
                
                // Smoothing pass
                const smoothIterations = state.settings.smooth;
                let currentHeights = heights;
                for (let iter = 0; iter < smoothIterations; iter++) {
                    const nextHeights = new Float32Array(res * res);
                    for (let y = 0; y < res; y++) {
                        for (let x = 0; x < res; x++) {
                            let sum = 0;
                            let count = 0;
                            for (let dy = -1; dy <= 1; dy++) {
                                for (let dx = -1; dx <= 1; dx++) {
                                    const nx = x + dx;
                                    const ny = y + dy;
                                    if (nx >= 0 && nx < res && ny >= 0 && ny < res) {
                                        sum += currentHeights[ny * res + nx];
                                        count++;
                                    }
                                }
                            }
                            nextHeights[y * res + x] = sum / count;
                        }
                    }
                    currentHeights = nextHeights;
                }
                
                for (let i = 0; i < vertices.length / 3; i++) {
                    const vx = vertices[i * 3];
                    const vy = vertices[i * 3 + 1];
                    const vz = vertices[i * 3 + 2];
                    
                    // Map physical coordinates to pixel coordinates
                    // vx goes from -20 to 20, vy goes from -20 to 20
                    const px = Math.min(Math.max(Math.floor((vx + 20) / 40 * res), 0), res - 1);
                    const py = Math.min(Math.max(Math.floor((20 - vy) / 40 * res), 0), res - 1);
                    
                    const height = currentHeights[py * res + px];
                    
                    if (vz > 0) {
                        vertices[i * 3 + 2] = height / 2;
                    } else {
                        vertices[i * 3 + 2] = -height / 2;
                    }
                    
                    // Update UVs to match physical coordinates
                    uvs[i * 2] = (vx + 20) / 40;
                    uvs[i * 2 + 1] = (vy + 20) / 40;
                }
                
                geometry.computeVertexNormals();
                
                // Create Texture
                const textureLoader = new THREE.TextureLoader();
                state.texture = textureLoader.load(processedImgSrc);
                state.texture.colorSpace = THREE.SRGBColorSpace;
                
                // Create Alpha Texture
                const alphaCanvas = document.createElement('canvas');
                alphaCanvas.width = res;
                alphaCanvas.height = res;
                const aCtx = alphaCanvas.getContext('2d');
                const aImgData = aCtx.createImageData(res, res);
                for (let i = 0; i < pImgData.data.length; i += 4) {
                    const a = pImgData.data[i+3];
                    aImgData.data[i] = a;
                    aImgData.data[i+1] = a;
                    aImgData.data[i+2] = a;
                    aImgData.data[i+3] = 255;
                }
                aCtx.putImageData(aImgData, 0, 0);
                state.alphaTexture = textureLoader.load(alphaCanvas.toDataURL());
                
                // Create Material
                updateMaterial(geometry);
                
                loadingOverlay.classList.remove('active');
                
                // Switch to Editor tab
                tabs[1].click();
            };
            img.onerror = () => {
                alert('Erro ao carregar a imagem. Tente outra.');
                loadingOverlay.classList.remove('active');
            };
            img.src = imgSrc;
        }

        function updateMaterial(newGeometry = null) {
            if (currentMesh) {
                scene.remove(currentMesh);
                if (!newGeometry) newGeometry = currentMesh.geometry;
            }
            
            const mode = document.getElementById('view-mode').value;
            const color = document.getElementById('material-color').value;
            
            let material;
            
            switch(mode) {
                case 'wireframe':
                    material = new THREE.MeshStandardMaterial({ 
                        color: color, 
                        wireframe: true,
                        transparent: true,
                        alphaTest: 0.1,
                        alphaMap: state.alphaTexture
                    });
                    break;
                case 'solid':
                    material = new THREE.MeshStandardMaterial({ 
                        color: color, 
                        roughness: 0.4, 
                        metalness: 0.1,
                        transparent: true,
                        alphaTest: 0.1,
                        alphaMap: state.alphaTexture,
                        side: THREE.DoubleSide
                    });
                    break;
                case 'normals':
                    material = new THREE.MeshNormalMaterial({
                        transparent: true,
                        alphaTest: 0.1,
                        // MeshNormalMaterial doesn't support alphaMap, so we just use the geometry as is.
                        // The flat plane will be visible, but it's a debug mode anyway.
                        side: THREE.DoubleSide
                    });
                    break;
                case 'textured':
                default:
                    material = new THREE.MeshStandardMaterial({ 
                        map: state.texture,
                        roughness: 0.5,
                        metalness: 0.1,
                        side: THREE.DoubleSide,
                        transparent: true,
                        alphaTest: 0.1
                    });
                    break;
            }
            
            currentMesh = new THREE.Mesh(newGeometry, material);
            
            // Center the mesh
            newGeometry.computeBoundingBox();
            const centerOffset = -0.5 * (newGeometry.boundingBox.max.z - newGeometry.boundingBox.min.z);
            currentMesh.position.z = centerOffset;
            
            scene.add(currentMesh);
        }

        // --- Settings Interactions ---
        
        document.getElementById('view-mode').addEventListener('change', () => updateMaterial());
        document.getElementById('material-color').addEventListener('input', () => {
            if (document.getElementById('view-mode').value === 'solid' || document.getElementById('view-mode').value === 'wireframe') {
                updateMaterial();
            }
        });
        
        document.getElementById('light-intensity').addEventListener('input', (e) => {
            dirLight.intensity = parseFloat(e.target.value);
        });
        
        document.getElementById('auto-rotate').addEventListener('change', (e) => {
            state.settings.autoRotate = e.target.checked;
        });
        
        document.getElementById('tool-grid').addEventListener('click', (e) => {
            state.settings.showGrid = !state.settings.showGrid;
            gridHelper.visible = state.settings.showGrid;
            e.target.classList.toggle('active');
        });
        
        document.getElementById('tool-reset').addEventListener('click', () => {
            controls.reset();
            camera.position.set(0, 0, 100);
            if (currentMesh) {
                currentMesh.rotation.set(0, 0, 0);
            }
        });

        // --- Export Logic ---
        
        function downloadFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.style.display = 'none';
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        document.getElementById('btn-export-glb').addEventListener('click', () => {
            if (!currentMesh || currentMesh.geometry.type === 'TorusKnotGeometry') {
                alert('Gere um modelo primeiro!'); return;
            }
            const exporter = new GLTFExporter();
            exporter.parse(
                scene,
                function (gltf) {
                    const output = JSON.stringify(gltf, null, 2);
                    const blob = new Blob([output], { type: 'text/plain' });
                    downloadFile(blob, 'modelo.gltf');
                },
                function (error) { console.error(error); alert('Erro ao exportar GLTF'); },
                { binary: false }
            );
        });

        document.getElementById('btn-export-obj').addEventListener('click', () => {
            if (!currentMesh || currentMesh.geometry.type === 'TorusKnotGeometry') {
                alert('Gere um modelo primeiro!'); return;
            }
            const exporter = new OBJExporter();
            const result = exporter.parse(scene);
            const blob = new Blob([result], { type: 'text/plain' });
            downloadFile(blob, 'modelo.obj');
        });

        document.getElementById('btn-export-stl').addEventListener('click', () => {
            if (!currentMesh || currentMesh.geometry.type === 'TorusKnotGeometry') {
                alert('Gere um modelo primeiro!'); return;
            }
            const exporter = new STLExporter();
            const result = exporter.parse(scene);
            const blob = new Blob([result], { type: 'text/plain' });
            downloadFile(blob, 'modelo.stl');
        });

    </script>
</body>
</html>
